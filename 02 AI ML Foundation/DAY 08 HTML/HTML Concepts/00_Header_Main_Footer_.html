<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header, Main, Footer Example</title>
    <style>
        /* Header section ka style */
        header {
            background-color: blue;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 1.5em;
        }

        /* Main section ka style */
        main {
            background-color: lightgray;
            padding: 30px;
            text-align: center;
            font-size: 1.2em;
        }

        /* Footer section ka style */
        footer {
            background-color: blue;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 1em;
        }
    </style>
</head>
<body>
    <!-- Header section: Page ka top part -->
    <header>
        <h1>Welcome to My Website</h1>
        <p>This is the Header Section</p>
    </header>

    <!-- Main section: Page ka main content area -->
    <main>
        <h2>Main Content</h2>
        <p>This is the main part of our web page where the actual content goes.</p>
    </main>

    <!-- Footer section: Page ka bottom part -->
    <footer>
        <p>This is the Footer Section © 2025</p>
    </footer>
</body>
</html>
