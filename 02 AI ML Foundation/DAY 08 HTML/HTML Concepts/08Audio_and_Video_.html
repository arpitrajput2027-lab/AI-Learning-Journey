<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio And Video Tag</title>
</head>
<body>

    <audio src="Z_Song.mp3" controls autoplay muted></audio>
    <video src="demoVideo.mp4" controls height="315" autoplay  muted></video>



    <!-- Professional Way to Add audio and Video  -->
     <br> <br>
     <h2> Professional Way to Add audio and Video</h2>
     <audio controls autoplay muted>
        <source src="Z_Song.mp3" type="audio/mp3">
        Your Browser NOT Support this Audio
     </audio>
     <video controls autoplay height="315" muted>
        <source src="demoVideo.mp4" type="video/mp4">
        Your Browser NOT Support this Video
  </video>
</body>
</html>
