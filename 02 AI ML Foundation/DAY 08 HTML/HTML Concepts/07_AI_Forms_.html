<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stylish Form</title>

    <style>
      /* 🌤️ Page Background */
      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 20px;
      }

      /* 💎 Form Container */
      form {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        padding: 40px 50px;
        max-width: 450px;
        width: 100%;
        color: #fff;
      }

      /* 🏷️ Headings */
      h1, h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #fff;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
      }

      label {
        display: block;
        font-weight: 500;
        margin-bottom: 6px;
      }

      /* ✍️ Input Styles */
      input[type="text"],
      input[type="email"],
      input[type="number"],
      input[type="password"],
      textarea,
      select,
      input[type="date"],
      input[type="month"],
      input[type="file"] {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: none;
        margin-bottom: 15px;
        background: rgba(255, 255, 255, 0.85);
        font-size: 15px;
        outline: none;
        transition: all 0.3s ease;
      }

      input:focus,
      textarea:focus,
      select:focus {
        box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
        transform: scale(1.02);
      }

      textarea {
        resize: vertical;
        min-height: 70px;
      }

      /* 🧠 Radio & Checkbox Section */
      input[type="radio"],
      input[type="checkbox"] {
        accent-color: #00ffb3;
        transform: scale(1.2);
        margin-right: 8px;
      }

      /* 🪄 Details + Summary */
      details {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 10px 15px;
        margin-top: 15px;
      }

      summary {
        cursor: pointer;
        font-weight: bold;
        color: #fff;
        transition: 0.3s;
      }

      summary:hover {
        color: #00ffb3;
      }

      /* 🚀 Buttons */
      input[type="submit"],
      input[type="reset"] {
        width: 48%;
        padding: 10px 0;
        border: none;
        border-radius: 10px;
        background: linear-gradient(90deg, #00c6ff, #0072ff);
        color: #fff;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-right: 2%;
      }

      input[type="reset"] {
        background: linear-gradient(90deg, #ff512f, #dd2476);
      }

      input[type="submit"]:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px #00c6ff;
      }

      input[type="reset"]:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px #ff4b2b;
      }

      /* ✨ Responsive */
      @media (max-width: 480px) {
        form {
          padding: 25px;
        }
        h1 {
          font-size: 1.6rem;
        }
      }
    </style>
  </head>

  <body>
    <form action="">
      <h1>Registration Form</h1>

      <label for="Name">Name :</label>
      <input type="text" id="Name" placeholder="e.g: Arpit Rajput Lodhi" name="username" />

      <label for="email">Email :</label>
      <input type="email" id="email" placeholder="example@gmail.com" name="uemail" />

      <label for="phone">Phone Number :</label>
      <input type="number" id="phone" placeholder="0123456789" name="uphone" />

      <label for="pw">Password :</label>
      <input type="password" id="pw" placeholder="*****************" name="upw" />

      <label for="ex">Experience :</label>
      <textarea name="ex" id="ex" placeholder="Write your experience here..."></textarea>

      <label>Do you have experience?</label>
      <input type="radio" id="rd" name="oneChoose" value="Yes" />
      <label for="rd">Yes</label>

      <input type="radio" id="no" name="oneChoose" value="No" />
      <label for="no">No</label>

      <h2>Choose 2 Subjects :</h2>
      <input type="checkbox" name="cx" id="cx" value="cpp" />
      <label for="cx">Cpp</label>

      <input type="checkbox" name="cx" id="cx1" value="html" />
      <label for="cx1">HTML</label>

      <input type="checkbox" name="cx" id="cx2" value="python" />
      <label for="cx2">Python</label>

      <input type="checkbox" name="cx" id="cx3" value="css" />
      <label for="cx3">CSS</label>

      <label for="subject">Choose a subject :</label>
      <select name="subject" id="subject">
        <option value="">--Choose Your Subjects--</option>
        <option value="cpp">Cpp</option>
        <option value="html">HTML</option>
        <option value="python">Python</option>
        <option value="css">CSS</option>
      </select>

      <input type="date" />
      <input type="month" />
      <input type="file" />

      <details>
        <summary>Click to See More</summary>
        <p style="color: #00ffb3;">This is the hidden content that will appear when you click above.</p>
      </details>

      <div style="text-align: center; margin-top: 20px;">
        <input type="submit" />  <br><br>
        <input type="reset" />
      </div>
    </form>
  </body>
</html>
